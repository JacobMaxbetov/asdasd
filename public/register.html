<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — КодЛенд</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Arial Rounded MT Bold', 'Comic Sans MS', system-ui, sans-serif;
    }
    .card {
      background: linear-gradient(145deg, #ffffff, #f8fafc);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-violet-600 min-h-screen flex items-center justify-center">

  <div class="max-w-md w-full mx-4">
    <!-- Логотип -->
    <div class="flex justify-center mb-8">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-yellow-400 rounded-3xl flex items-center justify-center text-5xl shadow-xl">🚀</div>
        <h1 class="text-5xl font-bold text-white tracking-tight">КодЛенд</h1>
      </div>
    </div>

    <div class="card rounded-3xl p-10">
      <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">Привет, будущий программист! 👋</h2>
      <p class="text-center text-gray-500 mb-8">Создай аккаунт и начни приключение</p>

      <form id="registerForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Имя пользователя (никнейм)</label>
          <input type="text" id="username" 
                 class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:border-purple-500 focus:ring-4 focus:ring-purple-200 outline-none text-lg"
                 placeholder="Например: КосмоКот" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email (необязательно)</label>
          <input type="email" id="email" 
                 class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:border-purple-500 focus:ring-4 focus:ring-purple-200 outline-none text-lg"
                 placeholder="example@kids.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Пароль</label>
          <input type="password" id="password" 
                 class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:border-purple-500 focus:ring-4 focus:ring-purple-200 outline-none text-lg"
                 placeholder="Придумай надёжный пароль" required>
        </div>

        <button type="submit"
                class="w-full py-5 bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-xl font-bold rounded-3xl hover:from-purple-700 hover:to-indigo-700 transition-all active:scale-95 shadow-lg">
          Зарегистрироваться
        </button>
      </form>

      <p class="text-center text-gray-500 mt-6">
        Уже есть аккаунт? 
        <a href="login.html" class="text-purple-600 font-semibold hover:underline">Войти</a>
      </p>
    </div>

    <p class="text-center text-white/70 text-sm mt-8">
      Безопасно • Весело • Для детей
    </p>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('http://localhost:3000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          alert('🎉 Регистрация прошла успешно!');
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html'; // создадим позже
        } else {
          alert(data.message || 'Что-то пошло не так');
        }
      } catch (err) {
        alert('Ошибка соединения с сервером. Убедись, что сервер запущен на порту 3000');
      }
    });
  </script>
</body>
</html>
